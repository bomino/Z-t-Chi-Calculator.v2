name = "ztchi-backend"
main = "worker.js"
compatibility_date = "2024-11-01"

# Allowed origins for CORS.
#   - ztchi.hgaladima.com / teach.hgaladima.com : the two CF Pages subdomains.
#     /api/* is proxied via Pages Functions + service binding (same-origin to
#     the browser), so CORS here is really only defense-in-depth against stray
#     direct calls to *.workers.dev.
#   - bomino.github.io : legacy GH Pages fallback. KEEP until GH Pages is
#     formally decommissioned. Removing this would break signature verification
#     for any signed link still shared under the old URL — which is exactly
#     the fallback the migration rollback plan depends on.
[vars]
ALLOWED_ORIGINS = "https://ztchi.hgaladima.com,https://teach.hgaladima.com,https://bomino.github.io,http://localhost:8804,http://127.0.0.1:8804"
RATE_LIMIT_PER_HOUR = "60"
AI_MODEL = "claude-haiku-4-5-20251001"

# Secrets are set via: wrangler secret put <name>
# Required secrets:
#   SIGN_SECRET         — HMAC-SHA256 secret for signing instructor problems
#   ANTHROPIC_API_KEY   — Anthropic Claude API key
# Optional secret:
#   INSTRUCTOR_TOKENS   — comma- or newline-separated list of per-instructor
#                         tokens. When set, /sign requires a Bearer token
#                         matching an entry. When unset, any origin in the
#                         allowlist can sign.
